name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Assemble app bundle (release)
        run: ./scripts/build.sh

      - name: Sanity-check the bundle
        run: |
          test -x build/Pookify.app/Contents/MacOS/Pookify
          test -x build/Pookify.app/Contents/MacOS/island-hook
          plutil -lint build/Pookify.app/Contents/Info.plist
